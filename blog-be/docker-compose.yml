# Chạy: docker compose up -d
# MinIO API: http://localhost:9000  | Console: http://localhost:9001 (minioadmin / minioadmin)
services:
  postgres:
    image: postgres:16-alpine
    container_name: blog-postgres
    environment:
      POSTGRES_USER: blog
      POSTGRES_PASSWORD: blog
      POSTGRES_DB: blog
    ports:
      - '5432:5432'
    volumes:
      - blog_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U blog -d blog']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: blog-redis
    ports:
      - '6380:6379'
    volumes:
      - blog_redis_data:/data

  minio:
    image: minio/minio:latest
    container_name: blog-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - blog_minio_data:/data

  # Tạo bucket + public đọc ảnh + CORS cho FE upload (PUT)
  minio-setup:
    image: minio/mc:latest
    container_name: blog-minio-setup
    depends_on:
      - minio
    volumes:
      - ./minio/cors.json:/cors.json:ro
    entrypoint: /bin/sh
    command:
      - -c
      - |
        sleep 4
        mc alias set local http://minio:9000 minioadmin minioadmin
        mc mb local/blog-uploads --ignore-existing
        mc anonymous set download local/blog-uploads
        mc cors set local/blog-uploads /cors.json
        echo 'MinIO bucket blog-uploads ready.'

volumes:
  blog_pg_data:
  blog_redis_data:
  blog_minio_data:
